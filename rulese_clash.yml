# ==========================================
# 1. 代理提供者 (Proxy Providers)
# ==========================================
proxy-providers:
  airport_01:
    type: http
    url: "这里替换为你的机场真实订阅链接"  # 只需修改这里
    interval: 0
    path: ./proxies/airport_01.yaml
    health-check:
      enable: true
      interval: 300
      url: http://www.gstatic.com/generate_204

# ==========================================
# 2. 策略组 (Proxy Groups)
# ==========================================
proxy-groups:
  # --- 地区与特征基础分组 (自动筛选) ---
  - name: 🇭🇰 香港节点
    type: select
    use: [airport_01]
    filter: "(港|HK|Hong)"

  - name: 🇯🇵 日本节点
    type: select
    use: [airport_01]
    filter: "(日|JP|Japan)"

  - name: 🇺🇸 美国节点
    type: select
    use: [airport_01]
    filter: "(美|US|America)"

  - name: 🇸🇬 新加坡节点
    type: select
    use: [airport_01]
    filter: "(新加坡|SG|Singapore)"

  - name: 🇹🇼 台湾节点
    type: select
    use: [airport_01]
    filter: "(台湾|TW|Taiwan)"

  - name: CloudFlare节点
    type: select
    use: [airport_01]
    filter: "(CF)"

  - name: CloudFlare自动选择
    type: url-test
    use: [airport_01]
    filter: "(CF)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: ♻️ 自动选择
    type: url-test
    use: [airport_01]
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  # --- 全局兜底策略组 ---
  - name: 🎯 全球直连
    type: select
    proxies: [DIRECT, 🚀 节点选择]

  - name: 🛑 全球拦截
    type: select
    proxies: [REJECT, DIRECT]

  - name: 🍃 应用净化
    type: select
    proxies: [REJECT, DIRECT]

  # --- 主业务策略组 ---
  - name: 🚀 节点选择
    type: select
    use: [airport_01]
    proxies: [🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 新加坡节点, 🇺🇸 美国节点, 🇹🇼 台湾节点, CloudFlare节点, CloudFlare自动选择, DIRECT]

